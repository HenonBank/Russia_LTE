name: Hourly Xray Config Checker & Repo Updater

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: xray-config-checker
  cancel-in-progress: true

jobs:
  run-checker:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        python3 -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run checker script
      run: python3 checker.py

    - name: Commit and Push changes
      run: |
        if [ ! -f "v2ray_sub.txt" ]; then
          echo "Файл v2ray_sub.txt не найден!"
          exit 1
        fi

        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"

        git add v2ray_sub.txt

        if git diff --cached --quiet; then
          echo "Нет изменений для коммита"
          exit 0
        fi

        git commit -m "Auto-update subscription links [skip ci]"
        git push origin HEAD:main
